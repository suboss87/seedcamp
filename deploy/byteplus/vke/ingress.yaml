apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seedcamp-ingress
  namespace: seedcamp
  labels:
    app: seedcamp
  annotations:
    # Adjust annotations based on your VKE ingress controller
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: seedcamp.yourdomain.com  # Replace with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: seedcamp-api
            port:
              number: 80
  - host: dashboard.yourdomain.com  # Replace with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: seedcamp-dashboard
            port:
              number: 80
