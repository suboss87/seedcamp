apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: adcamp-api
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '10'
        run.googleapis.com/cpu-throttling: 'false'
        run.googleapis.com/startup-cpu-boost: 'true'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
      - image: gcr.io/PROJECT_ID/adcamp:latest
        ports:
        - containerPort: 8000
        env:
        - name: ARK_API_KEY
          valueFrom:
            secretKeyRef:
              name: adcamp-secrets
              key: ARK_API_KEY
        - name: ARK_BASE_URL
          value: https://ark.ap-southeast.bytepluses.com/api/v3
        - name: OUTPUT_DIR
          value: /app/output
        resources:
          limits:
            cpu: '2'
            memory: 2Gi
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
