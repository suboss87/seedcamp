apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: adcamp-dashboard
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '5'
        run.googleapis.com/cpu-throttling: 'false'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 120
      containers:
      - image: gcr.io/PROJECT_ID/adcamp-dashboard:latest
        ports:
        - containerPort: 8501
        env:
        - name: API_URL
          value: https://adcamp-api-YOUR_PROJECT_HASH.asia-southeast1.run.app
        resources:
          limits:
            cpu: '1'
            memory: 512Mi
        startupProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
