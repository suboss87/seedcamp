apiVersion: apps/v1
kind: Deployment
metadata:
  name: seedcamp-api
  namespace: default
  labels:
    app: seedcamp
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: seedcamp
      component: api
  template:
    metadata:
      labels:
        app: seedcamp
        component: api
    spec:
      containers:
      - name: api
        image: seedcamp:latest  # Replace with your container registry URL
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ARK_API_KEY
          valueFrom:
            secretKeyRef:
              name: seedcamp-secrets
              key: ARK_API_KEY
        - name: ARK_BASE_URL
          valueFrom:
            secretKeyRef:
              name: seedcamp-secrets
              key: ARK_BASE_URL
        - name: OUTPUT_DIR
          value: "/app/output"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        volumeMounts:
        - name: output
          mountPath: /app/output
      volumes:
      - name: output
        emptyDir: {}
