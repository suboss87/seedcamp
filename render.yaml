# Render.com auto-detection — see deploy/render/ for full docs
services:
  - type: web
    name: seedcamp-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: ARK_API_KEY
        sync: false
      - key: ARK_BASE_URL
        value: https://ark.ap-southeast.bytepluses.com/api/v3
      - key: OUTPUT_DIR
        value: /app/output
    autoDeploy: true
