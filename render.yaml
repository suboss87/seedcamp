services:
  - type: web
    name: adcamp-api
    runtime: docker
    region: singapore
    plan: starter
    branch: main
    healthCheckPath: /health
    envVars:
      - key: ARK_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: PORT
        value: "8000"
      - key: DRY_RUN
        value: "false"
      - key: PERSISTENCE_BACKEND
        value: memory
